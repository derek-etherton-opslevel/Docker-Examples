# ============================================
# Spring Boot Application Configuration
# Chat Application Properties
# ============================================

# ============================================
# Server Configuration
# ============================================
# Port on which the application will listen for HTTP requests
# Default: 8080 (standard for Spring Boot applications)
server.port=8080

# ============================================
# Database Configuration (PostgreSQL)
# ============================================
# JDBC connection URL for PostgreSQL database
# Uses environment variables with fallback defaults for flexibility
# Format: jdbc:postgresql://host:port/database
# Environment variables: DB_HOST, DB_PORT, DB_NAME
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:chatdb}

# Database authentication credentials
# Uses environment variables for security (passwords should not be in code)
spring.datasource.username=${DB_USER:chatuser}
spring.datasource.password=${DB_PASSWORD:chatpass}

# JDBC driver class for PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA/Hibernate Configuration
# ============================================
# Hibernate DDL auto mode - automatically updates database schema
# Options: none, validate, update, create, create-drop
# 'update' safely adds new tables/columns without dropping existing data
spring.jpa.hibernate.ddl-auto=update

# Disable SQL logging in production for better performance
# Set to true during development to see generated SQL queries
spring.jpa.show-sql=false

# PostgreSQL-specific Hibernate dialect
# Optimizes SQL generation for PostgreSQL features
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Format SQL output for better readability (useful when show-sql=true)
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# RabbitMQ Configuration
# ============================================
# RabbitMQ server connection settings
# Uses environment variables with fallback defaults
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Virtual host for RabbitMQ (default is '/')
# Virtual hosts provide logical grouping and separation of resources
spring.rabbitmq.virtual-host=/

# ============================================
# Custom RabbitMQ Configuration
# ============================================
# Application-specific RabbitMQ settings
# These are used by RabbitMQConfig class to set up exchanges, queues, and bindings

# Name of the topic exchange for routing messages
rabbitmq.exchange.name=chat.exchange

# Name of the durable queue for storing messages
rabbitmq.queue.name=chat.queue

# Routing key for binding queue to exchange
rabbitmq.routing.key=chat.message

# ============================================
# Spring Boot Actuator Configuration
# ============================================
# Actuator endpoints provide monitoring and management capabilities

# Expose only health and info endpoints for security
# Other endpoints: metrics, env, loggers, etc. (enable as needed)
management.endpoints.web.exposure.include=health,info

# Show detailed health information only when authorized
# Options: never, when-authorized, always
management.endpoint.health.show-details=when-authorized

# Enable RabbitMQ health check indicator
# Checks connectivity to RabbitMQ as part of health status
management.health.rabbitmq.enabled=true

# ============================================
# Logging Configuration
# ============================================
# Configure logging levels for different packages

# Application-specific logging level
# Levels: TRACE, DEBUG, INFO, WARN, ERROR
logging.level.com.example.chat=INFO

# Spring framework web logging level
# Useful for debugging HTTP requests and responses
logging.level.org.springframework.web=INFO
